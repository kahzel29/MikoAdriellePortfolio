    button {

    }

        margin-top: 100px;
    }
</style>
</head>

<body id="body">
<header>
<nav>

</ul>
</nav>
</header>
<div class="calculator-container">

    <h2>Calculator</h2>

    <input type="number" id="num1" placeholder="First number">
    <input type="number" id="num2" placeholder="Second number">
    <br>

<button onclick="calculate('add')">Add</button>
<button onclick="calculate('sub')">Subtract</button>
<button onclick="calculate('mul')">Multiply</button>
<button onclick="calculate('div')">Divide</button>
<button onclick="clearFields()">Clear</button>

    <h3 id="result">Result: </h3>

    <!-- ✅ MOVED BUTTONS HERE -->
    <br>
    <button onclick="toggleAlert()">Toggle Alert</button>
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>

</div>

<script>
    let alertOn = true;

    function calculate(operation) {
        let num1 = parseFloat(document.getElementById("num1").value);
        let num2 = parseFloat(document.getElementById("num2").value);
        let result;

        if (isNaN(num1) || isNaN(num2)) {
            alert("Please enter valid numbers");
            return;
        }

        if (operation === "add") {
            result = num1 + num2;
        } else if (operation === "sub") {
            result = num1 - num2;
        } else if (operation === "mul") {
            result = num1 * num2;
        } else if (operation === "div") {
            if (num2 === 0) {
                alert("Cannot divide by zero");
                return;
            }
            result = num1 / num2;
        }

        document.getElementById("result").innerText = "Result: " + result;

        if (alertOn) {
            alert("Answer: " + result);
        }
    }

    function toggleAlert() {
        alertOn = !alertOn;
        alert("Alert is now " + (alertOn ? "ON" : "OFF"));
    }

    function toggleDarkMode() {
        let body = document.getElementById("body");
        body.classList.toggle("dark");
    }
    
    function clearFields() {
    document.getElementById("num1").value = "";
    document.getElementById("num2").value = "";
    document.getElementById("result").innerText = "Result: ";
}
</script>

</body>
</html>
