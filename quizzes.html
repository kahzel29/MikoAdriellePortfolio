<!-- DASHBOARD -->

<section class="dashboard">

<h2 style="margin-top:100px;">📊 Quiz Dashboard</h2>

<div class="dashboard-container">

<div class="dashboard-card">
<h3>Total Quizzes</h3>
<p id="totalQuiz">0</p>
</div>

<div class="dashboard-card">
<h3>Completed</h3>
<p id="completedQuiz">0</p>
</div>

<div class="dashboard-card">
<h3>Score</h3>
<p id="score">0%</p>
</div>

</div>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

</section>

<!-- QUIZ LIST -->

<section id="quizzes">

<h2>My Quizzes</h2>

<div class="quiz-container">

<div class="quiz-card" onclick="completeQuiz(1)">
<img src="QUIZ1.jpg">
<p>Quiz 1</p>
</div>

<div class="quiz-card" onclick="completeQuiz(2)">
<img src="QUIZ2.jpg">
<p>Quiz 2</p>
</div>

<div class="quiz-card" onclick="completeQuiz(3)">
<img src="QUIZ3.png">
<p>Quiz 3</p>
</div>

<div class="quiz-card" onclick="completeQuiz(4)">
<img src="QUIZ4.png">
<p>Quiz 4</p>
</div>

</div>

</section>

<!-- SCRIPT -->

<script>

// TOTAL QUIZZES
let total = 4;

// LOAD SAVED DATA
let completed = JSON.parse(localStorage.getItem("completed")) || [];
let score = JSON.parse(localStorage.getItem("score")) || 0;

// FUNCTION: COMPLETE QUIZ
function completeQuiz(id){

if(!completed.includes(id)){
completed.push(id);

// SAMPLE SCORE RANDOMIZER
let newScore = Math.floor(Math.random() * 100);

// SAVE DATA
localStorage.setItem("completed", JSON.stringify(completed));
localStorage.setItem("score", newScore);

updateDashboard();
alert("Quiz Completed!");
}
}

// UPDATE DASHBOARD
function updateDashboard(){

document.getElementById("totalQuiz").innerText = total;
document.getElementById("completedQuiz").innerText = completed.length;

let savedScore = JSON.parse(localStorage.getItem("score")) || 0;
document.getElementById("score").innerText = savedScore + "%";

// PROGRESS BAR
let progressPercent = (completed.length / total) * 100;
document.getElementById("progress").style.width = progressPercent + "%";

}

// RUN ON LOAD
updateDashboard();

</script>

</body>
